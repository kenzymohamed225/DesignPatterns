<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PetHome - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="logo">🐾 PetHome</div>
    <nav>
      <a href="index.html" title="Go to Home">Home</a>
      <a href="register.html" title="Go to Register">Register</a>
    </nav>
  </header>

  <main class="login-container">
    <div class="login-card">
      <div class="login-icon">🐾</div>
      <h2>Welcome Back!</h2>
      <p>Log in to your PetHome account to find your furry companion</p>

      <form action="/login" method="POST" class="login-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            required
            autocomplete="email"
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            required
            autocomplete="current-password"
          >
        </div>

        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" name="remember" id="remember">
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="login-btn">Log In</button>
      </form>

      <div class="signup-link">
        Don't have an account? <a href="register.html">Sign up free</a>
      </div>
    </div>
  </main>

  <footer>
    <p>🐾 &copy; 2025 PetHome. All rights reserved. Every pet deserves a loving home.</p>
  </footer>
</body>
</html>
