<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - PetHome</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">PetHome</div>
        <nav>
      <a href="index.html" title="Go to Home">Home</a>
      <a href="login.html" title="Go to Login">Login</a>
        </nav>
    </header>

    <main>
        
        <a href="index.html" class="back-link">← Back to Home</a>

        <div class="job-details-container">
            <h1 style="color: #0056b3; text-align: center;">Create Your Account</h1>
            
            <p style="text-align: center; color: #555; margin-bottom: 30px;">
                Join PetHome.
            </p>
            
            <hr>

            <form id="register-form">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" placeholder="Enter your first name" required>
                </div>

                <div class="form-group">
                    <label>Second Name</label>
                    <input type="text" placeholder="Enter your second name" required>
                </div>

            

                <div class="form-group">
                    <label>Mobile Number</label>
                    <input 
                        type="tel" 
                        placeholder="01xxxxxxxxx" 
                        maxlength="11" 
                        oninput="this.value = this.value.replace(/[^0-9]/g, '')" 
                        required>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="name@example.com" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input 
                        type="password" 
                        placeholder="Create a strong password" 
                        minlength="8" 
                        required>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <input 
                        type="password" 
                        placeholder="Re-enter your password" 
                        minlength="8" 
                        required>
                </div>

        

                <button type="submit" class="apply-btn">Create Account</button>
            </form>

            <p style="text-align: center; margin-top: 30px; color: #666;">
                Already have an account? <a href="login.html" style="color: #0056b3; font-weight: bold;">Log in here</a>
            </p>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 PetHome. All rights reserved.</p>
    </footer>

    <script>
        document.getElementById('register-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const password = this.querySelector('input[type="password"]').value;
            const confirmPassword = this.querySelectorAll('input[type="password"]')[1].value;

            if (password !== confirmPassword) {
                alert("Passwords do not match. Please try again.");
                return;
            }

        
            alert("Registration Successful!\nWelcome to HireHub. You can now log in.");
            
            window.location.href = "login.html";
        });
    </script>

</body>
</html>
